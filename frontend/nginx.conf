# DFIR-FENRIR v2 — frontend SPA static server (behind the edge Caddy).
# Serves the Vite-built dist on :3000. No TLS, no security headers here —
# the edge Caddy terminates TLS and owns HSTS/CSP/etc. This server only does
# static files + SPA fallback + correct cache semantics.

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed assets (index-<hash>.js/.css) never change for a given
    # name → cache hard. New deploys emit new hashes, so this is always safe.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must NOT be cached, so a redeploy is picked up immediately
    # (this is exactly the stale-bundle trap we want to avoid).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths return index.html so React Router can route
    # client-side (e.g. /incidents/123/evidence on a hard refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
